<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KnowledgeHub</title>
<style>
  :root{
    --bg:#0f172a; --panel:#ffffff; --ink:#0f172a; --muted:#64748b;
    --line:#e2e8f0; --brand:#0d9488; --brand-d:#0f766e; --accent:#2563eb;
    --soft:#f1f5f9; --ok:#16a34a; --warn:#b45309; --danger:#dc2626;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       color:var(--ink);background:#f8fafc}
  /* top bar */
  header{display:flex;align-items:center;gap:12px;padding:12px 22px;
    background:linear-gradient(90deg,#0f766e,#0d9488);color:#fff;box-shadow:0 1px 6px rgba(0,0,0,.15)}
  header .logo{font-weight:800;font-size:19px;letter-spacing:.3px}
  header .logo span{opacity:.8;font-weight:500}
  header .spacer{flex:1}
  header .who{font-size:13px;opacity:.95}
  header button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35);
    padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px}
  header button:hover{background:rgba(255,255,255,.28)}
  .badge{font-size:11px;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:20px}

  main{max-width:1140px;margin:22px auto;padding:0 18px;display:grid;
    grid-template-columns:360px 1fr;gap:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:18px;box-shadow:0 1px 3px rgba(15,23,42,.05)}
  .card h2{margin:0 0 12px;font-size:15px;display:flex;align-items:center;gap:8px}
  .card h2 .dot{height:8px;width:8px;border-radius:50%;background:var(--brand)}
  label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;font-weight:600}
  input,textarea,select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;
    font-size:14px;font-family:inherit;background:#fff}
  input:focus,textarea:focus{outline:2px solid #99f6e4;border-color:var(--brand)}
  textarea{min-height:90px;resize:vertical}
  button.primary{background:var(--brand);color:#fff;border:none;padding:10px 14px;border-radius:9px;
    font-weight:600;cursor:pointer;font-size:14px;width:100%;margin-top:12px}
  button.primary:hover{background:var(--brand-d)}
  button.ghost{background:var(--soft);border:1px solid var(--line);color:var(--ink);
    padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px}
  .row{display:flex;gap:8px}
  .muted{color:var(--muted);font-size:13px}
  .pill{display:inline-block;font-size:11px;background:#ecfeff;color:#0e7490;border:1px solid #a5f3fc;
    padding:2px 8px;border-radius:20px;margin:2px 4px 2px 0}
  /* auth screen */
  .auth-wrap{max-width:420px;margin:60px auto;padding:0 18px}
  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tabs button{flex:1;padding:9px;border:1px solid var(--line);background:#fff;border-radius:9px;
    cursor:pointer;font-weight:600;color:var(--muted)}
  .tabs button.active{background:var(--brand);color:#fff;border-color:var(--brand)}
  .hero{text-align:center;margin-bottom:18px}
  .hero .logo{font-size:26px;font-weight:800;color:var(--brand-d)}
  .hero p{color:var(--muted);margin:6px 0 0;font-size:14px}
  /* search results */
  .hit{padding:12px;border:1px solid var(--line);border-radius:11px;margin-bottom:10px;cursor:pointer;
    transition:.12s;background:#fff}
  .hit:hover{border-color:var(--brand);box-shadow:0 2px 10px rgba(13,148,136,.12)}
  .hit .t{font-weight:700;font-size:14px}
  .hit .s{font-size:11px;color:var(--brand-d);font-weight:700}
  .hit .h{font-size:12.5px;color:var(--muted);margin-top:4px}
  .hit em{background:#fef9c3;font-style:normal;padding:0 2px;border-radius:3px}
  /* doc viewer */
  .doc-title{font-size:20px;font-weight:800;margin:0}
  .doc-meta{font-size:12px;color:var(--muted);margin:6px 0 14px}
  .doc-body{white-space:pre-wrap;line-height:1.6;font-size:14.5px;background:#fff;
    border:1px solid var(--line);border-radius:11px;padding:14px;min-height:80px}
  .comment{border-left:3px solid var(--brand);background:var(--soft);padding:8px 12px;
    border-radius:0 9px 9px 0;margin:8px 0;font-size:13.5px}
  .comment .a{font-size:11px;color:var(--muted)}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:30px 10px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;
    padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  .ver{font-size:12px;padding:6px 0;border-bottom:1px dashed var(--line)}
  .hidden{display:none}
  @media(max-width:820px){main{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ===== AUTH SCREEN ===== -->
<div id="authScreen" class="auth-wrap">
  <div class="hero">
    <div class="logo">KnowledgeHub</div>
    <p>Enterprise knowledge base — documents, search & collaboration</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button id="tabLogin" class="active" onclick="showTab('login')">Sign in</button>
      <button id="tabReg" onclick="showTab('register')">Register</button>
    </div>

    <div id="loginForm">
      <label>Email</label>
      <input id="loginEmail" type="email" value="alice@corp.com" />
      <label>Password</label>
      <input id="loginPass" type="password" value="secret1" />
      <button class="primary" onclick="login()">Sign in</button>
    </div>

    <div id="registerForm" class="hidden">
      <label>Full name</label>
      <input id="regName" placeholder="Jane Doe" />
      <label>Email</label>
      <input id="regEmail" type="email" placeholder="jane@corp.com" />
      <label>Password</label>
      <input id="regPass" type="password" placeholder="min 6 characters" />
      <label>Role</label>
      <select id="regRole">
        <option value="editor">editor</option>
        <option value="viewer">viewer</option>
        <option value="admin">admin</option>
      </select>
      <button class="primary" onclick="register()">Create account</button>
    </div>
  </div>
  <p class="muted" style="text-align:center;margin-top:12px">
    Tip: a demo user <b>alice@corp.com / secret1</b> may already exist.
  </p>
</div>

<!-- ===== APP SCREEN ===== -->
<div id="appScreen" class="hidden">
  <header>
    <div class="logo">Knowledge<span>Hub</span></div>
    <span id="backendBadge" class="badge">backend: …</span>
    <div class="spacer"></div>
    <span class="who" id="whoami"></span>
    <button onclick="logout()">Sign out</button>
  </header>

  <main>
    <!-- LEFT: create + search -->
    <div>
      <div class="card">
        <h2><span class="dot"></span> Create document</h2>
        <label>Title</label>
        <input id="docTitle" placeholder="e.g. Kubernetes Deployment Guide" />
        <label>Content</label>
        <textarea id="docContent" placeholder="Write the document body…"></textarea>
        <label>Tags (comma separated)</label>
        <input id="docTags" placeholder="devops, k8s" />
        <button class="primary" onclick="createDoc()">Create &amp; index</button>
      </div>

      <div class="card" style="margin-top:16px">
        <h2><span class="dot"></span> Search</h2>
        <div class="row">
          <input id="searchQ" placeholder="Search documents…" onkeydown="if(event.key==='Enter')doSearch()" />
          <button class="ghost" onclick="doSearch()">Go</button>
        </div>
        <div id="searchMeta" class="muted" style="margin:10px 0 6px"></div>
        <div id="results"></div>
      </div>
    </div>

    <!-- RIGHT: document viewer -->
    <div class="card" id="viewer">
      <div class="empty" id="viewerEmpty">Select a search result to open a document.</div>
      <div id="docView" class="hidden">
        <h1 class="doc-title" id="vTitle"></h1>
        <div class="doc-meta" id="vMeta"></div>
        <div id="vTags"></div>
        <div class="doc-body" id="vBody"></div>

        <h2 style="margin-top:18px"><span class="dot"></span> Version history</h2>
        <div id="vVersions"></div>

        <h2 style="margin-top:18px"><span class="dot"></span> Comments</h2>
        <div id="vComments"></div>
        <div class="row" style="margin-top:8px">
          <input id="commentBox" placeholder="Add a comment…" onkeydown="if(event.key==='Enter')addComment()" />
          <button class="ghost" onclick="addComment()">Post</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script>
const $ = id => document.getElementById(id);
let TOKEN = localStorage.getItem("kh_token") || null;
let CURRENT_DOC = null;

function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200); }

async function api(method, path, body){
  const headers = {"Content-Type":"application/json"};
  if(TOKEN) headers["Authorization"] = "Bearer "+TOKEN;
  const res = await fetch(path, {method, headers, body: body?JSON.stringify(body):undefined});
  if(res.status===204) return {};
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.detail || ("HTTP "+res.status));
  return data;
}
// login uses form-encoded (OAuth2 password flow)
async function apiForm(path, form){
  const res = await fetch(path,{method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:new URLSearchParams(form)});
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.detail || ("HTTP "+res.status));
  return data;
}

function showTab(which){
  const login = which==="login";
  $("tabLogin").classList.toggle("active",login);
  $("tabReg").classList.toggle("active",!login);
  $("loginForm").classList.toggle("hidden",!login);
  $("registerForm").classList.toggle("hidden",login);
}

async function register(){
  try{
    await api("POST","/auth/register",{
      full_name:$("regName").value, email:$("regEmail").value,
      password:$("regPass").value, role:$("regRole").value});
    toast("Account created — signing you in");
    $("loginEmail").value=$("regEmail").value; $("loginPass").value=$("regPass").value;
    await login();
  }catch(e){ toast("Register failed: "+e.message); }
}

async function login(){
  try{
    const data = await apiForm("/auth/login",{username:$("loginEmail").value,password:$("loginPass").value});
    TOKEN = data.access_token; localStorage.setItem("kh_token",TOKEN);
    await enterApp();
  }catch(e){ toast("Login failed: "+e.message); }
}

function logout(){ TOKEN=null; localStorage.removeItem("kh_token");
  $("appScreen").classList.add("hidden"); $("authScreen").classList.remove("hidden"); }

async function enterApp(){
  const me = await api("GET","/auth/me");
  $("whoami").textContent = me.full_name+" ("+me.role+")";
  $("authScreen").classList.add("hidden"); $("appScreen").classList.remove("hidden");
  try{ const h=await api("GET","/health");
    $("backendBadge").textContent = "search: "+h.search_backend; }catch{}
  doSearch();
}

async function createDoc(){
  try{
    const tags = $("docTags").value.split(",").map(s=>s.trim()).filter(Boolean);
    const doc = await api("POST","/documents",{title:$("docTitle").value,content:$("docContent").value,tags});
    toast("Created & indexed: "+doc.title);
    $("docTitle").value=""; $("docContent").value=""; $("docTags").value="";
    setTimeout(doSearch,800); // allow ES near-real-time refresh
  }catch(e){ toast("Create failed: "+e.message); }
}

async function doSearch(){
  const q = $("searchQ").value.trim() || "*";
  try{
    const r = await api("GET","/search?q="+encodeURIComponent(q)+"&limit=10");
    $("searchMeta").textContent = r.total+" result(s) · "+r.took_ms+" ms · "+(r.cached?"from cache":"fresh");
    const box = $("results"); box.innerHTML="";
    if(!r.hits.length){ box.innerHTML='<div class="empty">No documents match.</div>'; return; }
    r.hits.forEach(h=>{
      const d=document.createElement("div"); d.className="hit"; d.onclick=()=>openDoc(h.document_id);
      d.innerHTML=`<div class="s">score ${h.score.toFixed(3)}</div>
        <div class="t">${esc(h.title)}</div>
        <div class="h">${h.highlight?h.highlight:""}</div>`;
      box.appendChild(d);
    });
  }catch(e){ toast("Search failed: "+e.message); }
}

async function openDoc(id){
  try{
    const doc = await api("GET","/documents/"+id);
    CURRENT_DOC = doc;
    $("viewerEmpty").classList.add("hidden"); $("docView").classList.remove("hidden");
    $("vTitle").textContent = doc.title;
    $("vMeta").textContent = "version "+doc.current_version+" · id "+doc.id.slice(0,8)+" · updated "+(doc.updated_at||"").slice(0,19).replace("T"," ");
    $("vTags").innerHTML = (doc.tags||[]).map(t=>`<span class="pill">${esc(t)}</span>`).join("");
    $("vBody").textContent = doc.content;
    loadVersions(id); loadComments(id);
  }catch(e){ toast("Open failed: "+e.message); }
}

async function loadVersions(id){
  try{
    const vs = await api("GET","/documents/"+id+"/versions");
    $("vVersions").innerHTML = vs.map(v=>`<div class="ver"><b>v${v.version}</b>
      <span class="muted">· ${(v.created_at||"").slice(0,19).replace("T"," ")}</span></div>`).join("");
  }catch(e){ $("vVersions").innerHTML='<div class="muted">—</div>'; }
}

async function loadComments(id){
  try{
    const cs = await api("GET","/documents/"+id+"/comments");
    $("vComments").innerHTML = cs.length ? cs.map(c=>`<div class="comment">${esc(c.body)}
      <div class="a">${(c.created_at||"").slice(0,19).replace("T"," ")}</div></div>`).join("")
      : '<div class="muted">No comments yet.</div>';
  }catch(e){ $("vComments").innerHTML='<div class="muted">—</div>'; }
}

async function addComment(){
  if(!CURRENT_DOC) return;
  const body = $("commentBox").value.trim(); if(!body) return;
  try{
    await api("POST","/documents/"+CURRENT_DOC.id+"/comments",{body});
    $("commentBox").value=""; loadComments(CURRENT_DOC.id); toast("Comment posted");
  }catch(e){ toast("Comment failed: "+e.message); }
}

function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// auto-enter if a token is already stored
if(TOKEN){ enterApp().catch(()=>logout()); }
</script>
</body>
</html>
